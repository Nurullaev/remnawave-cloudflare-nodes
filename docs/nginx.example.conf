# Nginx reverse proxy for remnawave-cloudflare-nodes HTTP API
#
# Prerequisites:
#   1. api.enabled: true in config.yml
#   2. Nginx joined to the remnawave-cloudflare-nodes Docker network:
#
#      networks:
#        remnawave-cloudflare-nodes:
#          external: true
#
# The service is reachable by its container name inside the shared Docker network.

server {
    listen 80;
    server_name example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/nginx/ssl/example.com.crt;
    ssl_certificate_key /etc/nginx/ssl/example.com.key;

    # --- Option 1: plain domain ---
    # API available at: https://example.com/api/...

    location / {
        proxy_pass         http://remnawave-cloudflare-nodes:8741;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Option 2: custom path prefix (recommended for obscurity) ---
    # API available at: https://example.com/c3f8a1e4b7d2f9c6a3e8b1d4f7c2a9e5/api/...
    #
    # The path prefix below is an example. Replace it with your own random string.
    # Generate a new one with:
    #   openssl rand -hex 16
    #
    # Nginx strips the prefix before forwarding, so the app receives /api/...
    #
    # Uncomment the block below and remove Option 1 to use this instead.

    # location /c3f8a1e4b7d2f9c6a3e8b1d4f7c2a9e5/ {
    #     proxy_pass         http://remnawave-cloudflare-nodes:8741/;
    #     proxy_http_version 1.1;
    #
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

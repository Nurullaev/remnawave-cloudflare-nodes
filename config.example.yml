remnawave:
  # Health check interval in seconds
  check-interval: 30

# Domains and DNS zones to manage
domains:
  - domain: example1.com
    zones:
      - name: s1          # Creates s1.example1.com
        ttl: 60           # Record TTL in seconds
        proxied: false    # Cloudflare proxy (orange cloud)
        ips:              # Node IPs to monitor
          - 1.2.3.4
          - 5.6.7.8

  - domain: example2.com
    zones:
      - name: s2
        ttl: 60
        proxied: false
        nodes:                   # Advanced format: map DNS IP to node address
          - ip: 13.14.15.16
            address: 100.64.0.1  # Tailscale/internal address in Remnawave
          - ip: 17.18.19.20
            address: 100.64.0.2
        ips:                     # Mixed: plain IPs alongside nodes in the same zone
          - 21.22.23.24

logging:
  level: INFO # DEBUG, INFO, WARNING, ERROR, CRITICAL

api:
  enabled: false
  host: "0.0.0.0"
  port: 8741
  docs: false  # Swagger UI at /api/docs

telegram:
  enabled: false
  locale: en  # en, ru
  notify:
    node_changes: true  # Node online/offline
    dns_changes: true   # DNS record changes
    errors: true        # Error alerts
    critical: true      # All nodes down alert
    api_changes: true   # HTTP API config changes
